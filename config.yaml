github:
  owner: 'fokell996'
  repo: daily-paper-reader
arxiv_paper_setting:
  mode: standard
  days_window: 9
  docs_dir: docs
  prefer_supabase_read: true
supabase:
  enabled: true
  url: https://lyucdwgefyfbmaiopjbk.supabase.co
  anon_key: sb_publishable_lX-oi64Uxyd7SIVv3_w2Uw_MTOojeKq
  papers_table: arxiv_papers
  use_vector_rpc: true
  vector_rpc: match_arxiv_papers
  vector_rpc_ann: match_arxiv_papers
  vector_rpc_exact: match_arxiv_papers_exact
  use_bm25_rpc: true
  bm25_rpc: match_arxiv_papers_bm25
  sync_table: arxiv_sync_status
  sync_success_value: success
  schema: public
subscriptions:
  schema_migration:
    stage: A
    diff_threshold_pct: 15
  keyword_recall_mode: or
  intent_profiles:
    - tag: pulsar-frb
      description: 脉冲星、中子星、致密星演化、状态方程以及夸克物质等相关论文追踪
      enabled: true
      paper_sources:
        - arxiv
      keywords:
        - keyword: pulsar timing
          keyword_cn: 脉冲星计时
          query: pulsar timing observations, noise analysis, and astrophysical applications
        - keyword: neutron star equation of state
          keyword_cn: 中子星状态方程
          query: neutron star equation of state constraints from nuclear physics and observations
        - keyword: fast radio burst
          keyword_cn: 快速射电暴
          query: fast radio burst progenitors and coherent emission mechanisms
        - keyword: magnetar
          keyword_cn: 磁星
          query: magnetar properties, magnetic field evolution, and outbursts
        - keyword: pulsar glitch
          keyword_cn: 脉冲星自转突变
          query: pulsar glitch phenomena, vortex creep, and neutron star interior dynamics
        - keyword: Color-Flavor-Locked
          keyword_cn: CFL夸克物质
          query: Color-Flavor-Locked CFL equation of state and strange quark stars
        - keyword: neutron star cooling
          keyword_cn: 中子星冷却
          query: neutron star thermal evolution, surface thermal radiation, and cooling crust
        - keyword: rotochemical heating
          keyword_cn: 旋转化学加热
          query: rotochemical heating and non-equilibrium beta processes in compact stars
        - keyword: NICER constraints
          keyword_cn: NICER观测约束
          query: NICER X-ray pulse profile modeling, mass and radius constraints for neutron stars
      intent_queries:
        - query: How to use observational data of pulsars or pulsar-like compact objects to constrain the Equation of State?
          query_cn: 如何利用脉冲星观测或者是类脉冲星致密天体的观测数据来约状态方程或奇异夸克星？
          enabled: true
          source: manual
          note: ''
        - query: What are the latest developments in using gravitational waves (GW170817) and X-ray data (NICER) to break the degeneracies in the dense matter equation of state?
          query_cn: 利用引力波（GW170817）和X射线数据（NICER）来消除致密物质状态方程简并性的最新进展是什么？
          enabled: true
          source: manual
          note: ''
        - query: Recent theoretical models or observational analysis on pulsar glitches, vortex creep heating, and internal heating mechanisms during neutron star evolution.
          query_cn: 脉冲星自转突变、涡旋蠕变加热以及中子星演化过程中内部加热机制的最新理论模型或观测数据分析。
          enabled: true
          source: manual
          note: ''
      updated_at: '2026-06-20T06:08:00.000Z'
source_backends:
  arxiv:
    papers_table: arxiv_papers
    use_vector_rpc: true
    vector_rpc: match_arxiv_papers
    vector_rpc_exact: match_arxiv_papers_exact
    use_bm25_rpc: true
    bm25_rpc: match_arxiv_papers_bm25
